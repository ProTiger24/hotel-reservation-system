# Server (Render dynamically injects PORT)
server.port=${PORT:8080}

# MySQL Database Configuration (env var দিয়ে আসবে, লোকাল ডিফল্ট হিসেবে localhost)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hotel_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Logging
logging.level.com.hotel=DEBUG
logging.level.org.springframework.web=INFO

# Application
spring.application.name=hotel-reservation-system
spring.main.allow-circular-references=true
